name: zapfnavi
description: "ZapfNavi: Günstig tanken – Echtzeit-Spritpreisvergleich für Deutschland."
publish_to: 'none'
version: 2.0.0+48

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # AdMob + GDPR Consent (UMP)

  # Backend
  supabase_flutter: ^2.6.0

  # State Management
  provider: ^6.1.2

  # Storage & Preferences
  shared_preferences: ^2.3.2

  # Networking
  http: ^1.2.1
  connectivity_plus: ^6.0.5

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  package_info_plus: ^8.0.2
  permission_handler: ^11.3.1
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^20.1.0
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/launcher_icon.png"
    background_color: "#1e1e1e"
    theme_color: "#1e1e1e"
  macos:
    generate: true
    image_path: "assets/icon/launcher_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/launcher_icon.png"
  image_path: "assets/icon/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
