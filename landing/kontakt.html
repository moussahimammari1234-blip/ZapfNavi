<!DOCTYPE html>
<html lang="de" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – ZapfNavi</title>
  <meta name="description" content="Kontaktiere ZapfNavi Support">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #FF5E00;
      --bg-deep: #050508;
      --bg-card: rgba(18, 18, 26, 0.65);
      --text-main: #ffffff;
      --text-muted: #a0aec0;
      --border-subtle: rgba(255, 255, 255, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      line-height: 1.65;
    }

    nav {
      padding: 16px 5%;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(8, 8, 12, 0.82);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
    }

    .logo span {
      color: var(--primary);
    }

    .container {
      max-width: 800px;
      margin: 40px auto 100px;
      padding: 0 20px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      margin-bottom: 30px;
      padding: 8px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .back:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    h1 {
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 800;
      margin-bottom: 30px;
      word-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
      line-height: 1.25;
      letter-spacing: -1px;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 15px;
      font-size: 16px;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      margin-bottom: 40px;
    }

    .email-link {
        display: inline-block;
        margin-top: 20px;
        padding: 14px 28px;
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .email-link:hover {
        text-decoration: none;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 94, 0, 0.4);
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html" class="logo">
      <img src="assets/icon.png" alt="ZapfNavi Logo">
      Zapf<span>Navi</span>
    </a>
  </nav>

  <div class="container">
    <a href="index.html" class="back">← Zurück zur Startseite</a>
    
    <h1>Kontakt</h1>

    <div class="info-card">
        <h2 style="font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 16px;">Lass uns sprechen!</h2>
        <p style="font-size: 16px; line-height: 1.7;">
            Du hast Feedback, Verbesserungsvorschläge oder benötigst Hilfe? 
            Wir freuen uns immer über Nachrichten unserer Community, denn durch dein Feedback machen wir ZapfNavi noch besser für alle.
        </p>
        
        <a href="mailto:moussahimammari1234@gmail.com" class="email-link">📧 E-Mail senden</a>
    </div>

  </div>
</body>

</html>
